scripts:
  - type: afterResponse
    code: |
      const json = pm.response.json();

      pm.test("Status 200", () => {
          pm.response.to.have.status(200);
      });

      pm.test("job = Senior QA Engineer", () => {
          pm.expect(json.job).to.eql("Senior QA Engineer");
      });
    language: text/javascript
