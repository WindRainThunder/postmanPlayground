$kind: http-request
name: ShouldGetUser
url: "{{base_url}}/api/users/{{userId}}"
method: GET
headers:
  x-api-key: "{{reqres_api_key}}"
scripts:
  - type: afterResponse
    code: "// Parsujemy JSON z odpowiedzi\r

      const json = pm.response.json();\r

      \r

      // status\r

      pm.test(\"Status 200\", () => {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      // konkretne pola\r

      pm.test(\"ID = 2\", () => {\r

      \    pm.expect(json.data.id).to.eql(2);\r

      });\r

      \r

      pm.test(\"Poprawny email\", () => {\r

      \    pm.expect(json.data.email).to.eql(\"janet.weaver@reqres.in\");\r

      });\r

      \r

      pm.test(\"Imię i nazwisko\", () => {\r

      \    pm.expect(json.data.first_name).to.eql(\"Janet\");\r

      \    pm.expect(json.data.last_name).to.eql(\"Weaver\");\r

      });"
    language: text/javascript
order: 1782137187255
